<app-headers [userName]="currUser?.name || '' "></app-headers>

<div class="container">
  <div class="profile-card" *ngIf="currUser">
    <h2>Welcome {{ currUser.name }}</h2>

    <p><strong>Name:</strong> {{ currUser.name }}</p>
    <p><strong>Email:</strong> {{ currUser.email }}</p>
    <p><strong>Phone Number:</strong> {{ currUser.phone }}</p>
    <p><strong>Role:</strong> {{ currUser.role }}</p>
  </div>
</div>
