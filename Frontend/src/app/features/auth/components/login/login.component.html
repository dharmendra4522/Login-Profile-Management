<div class="login-wrapper">
  <div class="login-decor-circle circle-1"></div>
  <div class="login-decor-circle circle-2"></div>
  
  <mat-card class="login-card">
    <div class="login-header">
      <div class="brand-logo-container">
        <mat-icon class="brand-icon">security</mat-icon>
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to manage your profile secure and fast</p>
    </div>

    <mat-card-content class="login-content">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        
        <!-- Email Input -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" placeholder="name@example.com" autocomplete="email">
          <mat-icon matPrefix>mail_outline</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email is <strong>required</strong>
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email') && !loginForm.get('email')?.hasError('required')">
            Please enter a <strong>valid</strong> email address
          </mat-error>
        </mat-form-field>

        <!-- Password Input -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter password" autocomplete="current-password">
          <mat-icon matPrefix>lock_outline</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Toggle password visibility'" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is <strong>required</strong>
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength') && !loginForm.get('password')?.hasError('required')">
            Password must be at least <strong>6 characters</strong>
          </mat-error>
        </mat-form-field>

        <!-- Login Button -->
        <button mat-raised-button color="primary" class="login-btn" type="submit" [disabled]="loginForm.invalid">
          <span>Sign In</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>

      </form>
    </mat-card-content>

    <div class="login-footer">
      <span class="security-text">
        <mat-icon class="shield-icon">verified_user</mat-icon>
        End-to-end encrypted connection
      </span>
    </div>
  </mat-card>
</div>
