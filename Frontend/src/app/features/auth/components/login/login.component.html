<div class="container">
    <div class="content">
        <h2>Login</h2>
        <form [formGroup]='loginForm' (ngSubmit)="onSubmit(loginForm)">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" class="form-control" id="username" name="username" placeholder="Enter Your Email" formControlName="email">

                <div>
                    <div *ngIf="loginForm.controls['email']?.invalid &&(loginForm.controls['email'].dirty || loginForm.controls['email'].touched)" class="error">
                        <div *ngIf="loginForm.controls['email']?.hasError('required')">Email is required.</div>
                        <div *ngIf="loginForm.controls['email']?.hasError('email')">Please enter a valid email address.</div>
                    </div>
                </div>

            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Your Password" formControlName="password">
                <div *ngIf="loginForm.controls['password']?.invalid &&(loginForm.controls['password'].dirty || loginForm.controls['password'].touched)" class="error">
                    <div *ngIf="loginForm.controls['password']?.hasError('required')">Password is required.</div>
                    <div *ngIf="loginForm.controls['password']?.hasError('minlength')">Password must be at least 6 characters long.</div>
                </div>
            </div>
            <div class="btn">
                <button type="submit" [disabled]="loginForm.invalid">Login</button>
            </div>
        </form>
    </div>
</div>
